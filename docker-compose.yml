services:
  backend:
    build: ./backend
    ports:
      - "5002:5002"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"        # ← Fixed to match Vite's actual port
    restart: unless-stopped

  mongo:
    image: mongo:8.2
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data: